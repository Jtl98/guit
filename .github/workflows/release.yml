name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  GH_TOKEN: ${{ github.token }}

jobs:
  create-release-if-nonexistent:
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.version.outputs.release-version }}
      release-exists: ${{ steps.exists.outputs.release-exists }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - id: version
        name: version
        run: |
          release_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "release-version=$release_version" >> "$GITHUB_OUTPUT"

      - id: exists
        name: exists
        run: |
          if gh release view "${{ steps.version.outputs.release-version }}"; then
            echo "release-exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release-exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: create release
        if: steps.exists.outputs.release-exists == 'false'
        run: gh release create --generate-notes "${{ steps.version.outputs.release-version }}"

  build-and-upload:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: x64-linux
            archive: tar.gz
          - os: macos-latest
            platform: arm64-macos
            archive: tar.gz
          - os: windows-latest
            platform: x64-windows
            archive: zip
    runs-on: ${{ matrix.os }}
    needs: create-release-if-nonexistent
    if: needs.create-release-if-nonexistent.outputs.release-exists == 'false'
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: build
        run: cargo build --release

      - name: test
        run: cargo test --release -- --show-output

      - name: package (unix)
        if: runner.os != 'Windows'
        run: tar -czf "guit-${{ needs.create-release-if-nonexistent.outputs.release-version }}-${{ matrix.platform }}.${{ matrix.archive }}" -C target/release guit

      - name: package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -DestinationPath "guit-${{ needs.create-release-if-nonexistent.outputs.release-version }}-${{ matrix.platform }}.${{ matrix.archive }}" -Path target/release/guit.exe

      - name: upload release
        run: gh release upload "${{ needs.create-release-if-nonexistent.outputs.release-version }}" "guit-${{ needs.create-release-if-nonexistent.outputs.release-version }}-${{ matrix.platform }}.${{ matrix.archive }}"
